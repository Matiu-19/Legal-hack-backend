name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:        # permite lanzarlo manualmente desde la pestaña Actions

env:
  PROJECT_ID: gen-lang-client-0398885476
  SERVICE: apphack-rce
  REGION: us-central1
  GCS_BUCKET: apphack-rce-docs            # bucket con el índice RAG (chromadb-index.tar.gz)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --allow-unauthenticated \
            --memory 4Gi \
            --cpu 2 \
            --min-instances 1 \
            --use-http2 \
            --timeout 600 \
            --set-env-vars GOOGLE_CLOUD_PROJECT="$PROJECT_ID",GCS_BUCKET="$GCS_BUCKET"